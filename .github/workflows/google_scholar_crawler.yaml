name: Get Citation Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-setuptools chromium-browser chromium-chromedriver
        python3 -m pip install --upgrade pip
    - name: Run crawler
      run: |
        cd ./google_scholar_crawler
        python3 -m pip install -r requirements.txt
        python3 main.py
    - name: Commit generated data
      run: |
        git config --local user.email "gaoxy_cup@163.com"
        git config --local user.name "${GITHUB_ACTOR}"
        if [[ -n $(git status --porcelain data/gs_data.json data/gs_data_shieldsio.json) ]]; then
          git add data/gs_data.json data/gs_data_shieldsio.json
          git commit -m "Update Google Scholar citation data"
          git push origin HEAD:main
        else
          echo "No changes to commit."
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
    env:
      GOOGLE_SCHOLAR_ID: Y_K9H_cAAAAJ
