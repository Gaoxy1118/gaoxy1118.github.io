{{ $total := .Get "total" | default "15" }}
{{ $first := .Get "first" | default "3" }}
{{ $impact := .Get "impact" | default "24.3" }}
{{ $citations := .Get "citations" | default "50+" }}

<div class="stats-grid">
    <div class="stat-item">
        <h4 class="stat-number">{{ $total }}</h4>
        <p class="stat-label">总数</p>
    </div>
    <div class="stat-item">
        <h4 class="stat-number">{{ $first }}</h4>
        <p class="stat-label">第一/通讯作者</p>
    </div>
    <div class="stat-item">
        <h4 class="stat-number">{{ $impact }}</h4>
        <p class="stat-label">累计影响因子</p>
    </div>
    <div class="stat-item">
        <h4 class="stat-number">{{ $citations }}</h4>
        <p class="stat-label">引用</p>
    </div>
</div>
